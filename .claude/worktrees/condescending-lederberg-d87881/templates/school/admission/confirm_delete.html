{% extends 'base.html' %}
{% block title %}Delete Student{% endblock %}
{% block page_title %}Delete Student{% endblock %}
{% block content %}
<div class="card p-4" style="max-width:420px">
  <h5 class="text-danger mb-2">Confirm Delete</h5>
  <p class="text-muted mb-4">Are you sure you want to delete <strong>{{ object }}</strong>? This cannot be undone.</p>
  <form method="post">
    {% csrf_token %}
    <div class="d-flex gap-2">
      <button class="btn btn-danger">Yes, Delete</button>
      <a href="{% url 'student_list' %}" class="btn btn-outline-secondary">Cancel</a>
    </div>
  </form>
</div>
{% endblock %}
